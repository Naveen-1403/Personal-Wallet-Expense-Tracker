<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Budget Buddy</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            background: #fff;
        }
        .login-header {
            background: transparent;
            padding: 30px 20px 10px;
            text-align: center;
        }
        .login-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .form-control {
            border-radius: 25px;
            padding: 12px 20px 12px 45px;
            background: #f4f7f6;
            border: 1px solid #eee;
        }
        .form-control:focus {
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon {
            position: absolute;
            left: 18px;
            top: 14px;
            color: #888;
            z-index: 10;
        }
        .btn-login {
            border-radius: 25px;
            padding: 12px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
            color: white;
        }
        .custom-alert {
            border-radius: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div th:if="${param.success}" class="alert alert-success text-center custom-alert shadow-sm">
                    <i class="fas fa-check-circle mr-1"></i> Registration Successful! Please login.
                </div>
                <div th:if="${param.error}" class="alert alert-danger text-center custom-alert shadow-sm">
                    <i class="fas fa-exclamation-circle mr-1"></i> Invalid Email or Password!
                </div>
                <div th:if="${param.logout}" class="alert alert-info text-center custom-alert shadow-sm">
                    <i class="fas fa-info-circle mr-1"></i> Logged out successfully.
                </div>

                <div class="card login-card mt-2">
                    <div class="login-header">
                        <i class="fas fa-wallet"></i>
                        <h4 class="font-weight-bold text-dark">Budget Buddy</h4>
                        <p class="text-muted small">Welcome back! Please login to your account.</p>
                    </div>
                    <div class="card-body px-4 pb-5">
                        <form th:action="@{/loginUser}" method="POST">
                            <div class="form-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                            </div>
                            <div class="form-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" name="password" class="form-control" placeholder="Password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block btn-login mt-4 text-white">LOGIN</button>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Don't have an account? <a th:href="@{/register}" class="text-primary font-weight-bold text-decoration-none">Create one</a></p>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
