<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction - My Personal Wallet</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #17a2b8 0%, #007bff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        .form-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: #fff;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin: auto;
        }
        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header i { font-size: 2.5rem; color: #17a2b8; }
        
        .form-group { position: relative; margin-bottom: 20px; }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 15px 12px 45px !important;
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            height: auto;
            font-size: 15px;
        }
        
        .form-control:focus {
            box-shadow: 0 0 10px rgba(23, 162, 184, 0.15);
            border-color: #17a2b8;
            background: #fff;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            bottom: 13px;
            color: #aaa;
            font-size: 18px;
            z-index: 10;
        }
        
        label { 
            font-weight: 600; 
            color: #444; 
            margin-bottom: 8px; 
            display: block;
            font-size: 14px;
        }

        .btn-save {
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            background: linear-gradient(135deg, #17a2b8 0%, #007bff 100%);
            border: none;
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4); }
        
        .back-link { color: #888; text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: #17a2b8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <div class="form-header">
                <i class="fas fa-edit"></i>
                <h4 class="font-weight-bold mt-2">Edit Transaction</h4>
                <p class="text-muted small">Update your record details</p>
            </div>
            
            <form th:action="@{/saveExpense}" th:object="${expense}" method="POST">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label>Transaction Type</label>
                    <i class="fas fa-exchange-alt input-icon"></i>
                    <select th:field="*{transactionType}" class="form-control" required>
                        <option value="EXPENSE">Expense (Selavu)</option>
                        <option value="INCOME">Income (Varavu)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <i class="fas fa-rupee-sign input-icon"></i>
                    <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <i class="fas fa-pen input-icon"></i>
                    <input type="text" th:field="*{description}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <i class="fas fa-tags input-icon"></i>
                    <input type="text" th:field="*{category}" class="form-control" placeholder="e.g. Petrol, Food, Movie" required>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <i class="fas fa-calendar-alt input-icon"></i>
                    <input type="date" th:field="*{date}" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-save text-white shadow">UPDATE TRANSACTION</button>
                <div class="text-center mt-3">
                    <a th:href="@{/}" class="back-link small font-weight-bold"><i class="fas fa-arrow-left mr-1"></i> Cancel and Go Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
